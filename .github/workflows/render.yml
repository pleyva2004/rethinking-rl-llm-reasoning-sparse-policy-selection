name: Render LaTeX

on:
  push:
    branches: [main]
    paths:
      - '**.tex'
      - '**.bib'
      - '.github/workflows/render.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile literature review
        if: hashFiles('04-literature-review.tex') != ''
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 04-literature-review.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Compile improvements
        if: hashFiles('05-improvements.tex') != ''
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 05-improvements.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Compile interview handout
        if: hashFiles('interview-handout.tex') != ''
        uses: xu-cheng/latex-action@v3
        with:
          root_file: interview-handout.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Stage generated PDFs in pdfs/
        run: |
          mkdir -p pdfs
          for f in 04-literature-review.pdf 05-improvements.pdf interview-handout.pdf; do
            if [ -f "$f" ]; then
              mv "$f" "pdfs/$f"
              echo "Moved $f → pdfs/"
            fi
          done
          ls -la pdfs/

      - name: Commit and push PDFs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pdfs/
          if git diff --cached --quiet; then
            echo "No PDF changes to commit"
          else
            git commit -m "render: update compiled PDFs [skip ci]"
            git push
          fi

  render-tour:
    runs-on: ubuntu-latest
    needs: render
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Pull latest (render may have just committed)
        run: git pull --rebase
      - name: Compile tour
        uses: xu-cheng/latex-action@v3
        with:
          root_file: tour.tex
          working_directory: learning-map
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error
      - name: Commit tour.pdf
        if: hashFiles('learning-map/tour.tex') != ''
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add learning-map/tour.pdf
          if git diff --cached --quiet; then
            echo "No tour.pdf change to commit"
          else
            git commit -m "render: update tour.pdf [skip ci]"
            git push
          fi

  render-proofs:
    runs-on: ubuntu-latest
    needs: render-tour     # serialise after render-tour to avoid push races
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Pull latest (render-tour may have just committed)
        run: git pull --rebase
      - name: Install TeX Live
        if: hashFiles('proofs/*.tex') != ''
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended texlive-fonts-recommended \
            texlive-latex-extra texlive-science latexmk
      - name: Compile every proof
        if: hashFiles('proofs/*.tex') != ''
        run: |
          set -e
          for f in proofs/*.tex; do
            [ -f "$f" ] || continue
            echo "Compiling $f"
            (cd proofs && latexmk -pdf -interaction=nonstopmode -halt-on-error "$(basename "$f")")
          done
          ls -la proofs/
      - name: Commit proof PDFs
        if: hashFiles('proofs/*.tex') != ''
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add proofs/*.pdf
          if git diff --cached --quiet; then
            echo "No proof PDF changes to commit"
          else
            git commit -m "render: update proof PDFs [skip ci]"
            git push
          fi
